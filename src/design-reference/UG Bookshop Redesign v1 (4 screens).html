<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>University of Ghana Bookshop — Redesign Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1520; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    input, button { font-family: inherit; }
  </style>
</head>
<body>

<!-- Component scripts -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/HomeMobile.jsx"></script>
<script type="text/babel" src="screens/SearchDesktop.jsx"></script>
<script type="text/babel" src="screens/ProductMobile.jsx"></script>
<script type="text/babel" src="screens/CheckoutMobile.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "navyColor": "#001a36",
  "goldColor": "#C9920A",
  "bgColor": "#0d1520",
  "showLabels": true,
  "deviceScale": 0.62
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('home');

  // Navigation handler shared across all screens
  const handleNavigate = (dest) => setScreen(dest);

  const navy = t.navyColor;
  const gold = t.goldColor;

  const screenLabels = {
    home: { label: '01 — Homepage', sub: 'Mobile View', icon: '📱' },
    search: { label: '02 — Search Results', sub: 'Desktop View', icon: '🖥️' },
    product: { label: '03 — Product Detail', sub: 'Mobile View', icon: '📱' },
    checkout: { label: '04 — Checkout', sub: 'Payment Step · Mobile View', icon: '📱' },
  };

  const screens = ['home', 'search', 'product', 'checkout'];
  const currentIdx = screens.indexOf(screen);

  const navigate = (dir) => {
    const newIdx = currentIdx + dir;
    if (newIdx >= 0 && newIdx < screens.length) setScreen(screens[newIdx]);
  };

  return (
    <div style={{
      width: '100vw', height: '100vh',
      background: `radial-gradient(ellipse at 30% 20%, #0d2040 0%, ${t.bgColor} 60%)`,
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      fontFamily: '"DM Sans", sans-serif',
      position: 'relative', overflow: 'hidden',
    }}>

      {/* Ambient background elements */}
      <div style={{
        position: 'absolute', top: '10%', left: '5%',
        width: 300, height: 300,
        background: `radial-gradient(circle, ${gold}18 0%, transparent 70%)`,
        pointerEvents: 'none',
      }}/>
      <div style={{
        position: 'absolute', bottom: '15%', right: '8%',
        width: 200, height: 200,
        background: `radial-gradient(circle, ${navy}60 0%, transparent 70%)`,
        pointerEvents: 'none',
      }}/>

      {/* Top label */}
      {t.showLabels && (
        <div style={{
          position: 'absolute', top: 20, left: 0, right: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
        }}>
          <div style={{
            background: 'rgba(255,255,255,0.06)',
            border: '1px solid rgba(255,255,255,0.1)',
            borderRadius: 100, padding: '6px 16px',
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: gold }} />
            <span style={{ color: 'rgba(255,255,255,0.5)', fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
              University of Ghana Bookshop · Phase 1 Redesign
            </span>
          </div>
        </div>
      )}

      {/* Screen label */}
      {t.showLabels && (
        <div style={{
          position: 'absolute', top: 60,
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
        }}>
          <div style={{ color: 'rgba(255,255,255,0.9)', fontSize: 18, fontWeight: 700 }}>
            {screenLabels[screen]?.label}
          </div>
          <div style={{ color: gold, fontSize: 12, fontWeight: 500 }}>
            {screenLabels[screen]?.sub}
          </div>
        </div>
      )}

      {/* Device frame */}
      <div style={{ transform: `scale(${t.deviceScale})`, transformOrigin: 'center center', transition: 'transform 0.3s' }}>
        {screen === 'search' ? (
          // Desktop screen — browser window
          <ChromeWindow
            tabs={[{ title: 'UG Bookshop — CSCD 201 Results' }]}
            activeIndex={0}
            url="bookshop.ug.edu.gh/search?q=CSCD+201"
            width={1100}
            height={750}
          >
            <SearchDesktop onNavigate={handleNavigate} />
          </ChromeWindow>
        ) : (
          // Mobile screens — iOS device
          <IOSDevice
            width={402}
            height={874}
            dark={false}
          >
            {screen === 'home' && <HomeMobile onNavigate={handleNavigate} />}
            {screen === 'product' && <ProductMobile onNavigate={handleNavigate} />}
            {screen === 'checkout' && <CheckoutMobile onNavigate={handleNavigate} />}
          </IOSDevice>
        )}
      </div>

      {/* Bottom navigation */}
      <div style={{
        position: 'absolute', bottom: 24,
        display: 'flex', alignItems: 'center', gap: 16,
      }}>
        {/* Prev */}
        <button
          onClick={() => navigate(-1)}
          disabled={currentIdx === 0}
          style={{
            width: 40, height: 40, borderRadius: '50%',
            border: '1.5px solid rgba(255,255,255,0.15)',
            background: currentIdx === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.08)',
            color: currentIdx === 0 ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.7)',
            cursor: currentIdx === 0 ? 'default' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all 0.2s',
          }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>

        {/* Screen dots */}
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {screens.map((s, i) => (
            <div
              key={s}
              onClick={() => setScreen(s)}
              title={screenLabels[s].label}
              style={{
                width: screen === s ? 24 : 8,
                height: 8, borderRadius: 4,
                background: screen === s ? gold : 'rgba(255,255,255,0.2)',
                cursor: 'pointer',
                transition: 'all 0.25s',
              }}
            />
          ))}
        </div>

        {/* Next */}
        <button
          onClick={() => navigate(1)}
          disabled={currentIdx === screens.length - 1}
          style={{
            width: 40, height: 40, borderRadius: '50%',
            border: '1.5px solid rgba(255,255,255,0.15)',
            background: currentIdx === screens.length - 1 ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.08)',
            color: currentIdx === screens.length - 1 ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.7)',
            cursor: currentIdx === screens.length - 1 ? 'default' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all 0.2s',
          }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>

      {/* Screen quick-nav pills */}
      <div style={{
        position: 'absolute', right: 20, top: '50%',
        transform: 'translateY(-50%)',
        display: 'flex', flexDirection: 'column', gap: 6,
      }}>
        {screens.map((s) => (
          <div
            key={s}
            onClick={() => setScreen(s)}
            title={screenLabels[s].label}
            style={{
              padding: '5px 10px', borderRadius: 20, cursor: 'pointer',
              background: screen === s ? gold : 'rgba(255,255,255,0.05)',
              border: `1px solid ${screen === s ? gold : 'rgba(255,255,255,0.1)'}`,
              color: screen === s ? '#000' : 'rgba(255,255,255,0.4)',
              fontSize: 10, fontWeight: 700, letterSpacing: '0.06em',
              transition: 'all 0.2s', whiteSpace: 'nowrap',
              display: 'flex', alignItems: 'center', gap: 5,
            }}
          >
            <span>{screenLabels[s].icon}</span>
            {screen === s && <span style={{ textTransform: 'uppercase' }}>{s}</span>}
          </div>
        ))}
      </div>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Brand Colors" />
        <TweakColor label="Navy" value={t.navyColor} onChange={v => setTweak('navyColor', v)} />
        <TweakColor label="Gold" value={t.goldColor} onChange={v => setTweak('goldColor', v)} />
        <TweakSection label="Canvas" />
        <TweakColor label="Background" value={t.bgColor} onChange={v => setTweak('bgColor', v)} />
        <TweakToggle label="Show labels" value={t.showLabels} onChange={v => setTweak('showLabels', v)} />
        <TweakSlider label="Device scale" value={t.deviceScale} min={0.4} max={1.0} step={0.02} onChange={v => setTweak('deviceScale', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<div id="root"></div>
</body>
</html>
